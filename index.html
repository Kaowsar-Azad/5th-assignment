<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

     <title>Document</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>

   
</head>
<body class="min-h-screen max-w-md  mx-auto bg-base-200">

    <div class="logo flex justify-center   mx-auto">
        <img class=" mt-[90px] " src="assets/github-logo.png" alt="" srcset="">
    </div>
    <div class="text-center mt-5">
        <p class="text-2xl">GitHub Issues Tracker</p>
        <p class="text-[16px] text-[#64748B] ">Sign in to manage your issues</p>
    </div>
   <div class=" pt-10">
     <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label  class="label text-neutral font-bold text-[17px]  ">Username</label>
          <input id="input-number" type="text" maxlength="11"   class="input  " placeholder="Enter Username" />
          <span class=" text-[14px] text-[#4A00FF]">Default: admin</span>
          <label   class="label text-neutral font-bold  text-[17px]">Password</label>
          <input type="text"  id="input-code"  class="input" placeholder="Enter Password" />
          <span class=" text-[14px] text-[#4A00FF]">Default: admin123</span>
          <button id="btn-button" class="btn btn-primary mt-4   text-[16px]">Sign In</button>
        </fieldset>
      </div>
   </div>
   <script src="login.js"></script>
</body>
</html>
